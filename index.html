<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_dXyyPTCUFfA_uJs6gxSyaBmbbn2Eh14",
            authDomain: "quiniela-mundial-2026-baf3b.firebaseapp.com",
            projectId: "quiniela-mundial-2026-baf3b",
            storageBucket: "quiniela-mundial-2026-baf3b.firebasestorage.app",
            messagingSenderId: "47313550839",
            appId: "1:47313550839:web:4341e05d36eab06d79c2f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // AQUÍ DEFINES TUS JORNADAS
        const cronograma = {
            "Jornada 1": [
                { id: "A1", local: "Equipo A", visita: "Equipo B" },
                { id: "A2", local: "Equipo C", visita: "Equipo D" }
            ],
            "Jornada 2": [
                { id: "B1", local: "Equipo E", visita: "Equipo F" },
                { id: "B2", local: "Equipo G", visita: "Equipo H" }
            ]
        };

        async function renderizarEstructura() {
            const container = document.getElementById('gruposContainer');
            container.innerHTML = "";
            
            Object.entries(cronograma).forEach(([nombreJornada, partidos]) => {
                let html = `<div class="grupo-card">
                    <div class="grupo-titulo">${nombreJornada}</div>`;
                
                partidos.forEach(p => {
                    html += `<div class="partido">
                        <div class="bloque-equipo local">${p.local}</div>
                        <input type="number" id="${p.id}_L" class="input-goles" placeholder="-">
                        <span class="vs">VS</span>
                        <input type="number" id="${p.id}_V" class="input-goles" placeholder="-">
                        <div class="bloque-equipo visitante">${p.visita}</div>
                    </div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            });
        }

        async function guardarQuiniela() {
            const nombre = document.getElementById('nombreUsuario').value.trim().toLowerCase();
            if (!nombre) { alert("Escribe tu nombre"); return; }
            
            const predicciones = {};
            document.querySelectorAll('.input-goles').forEach(input => {
                if (input.value !== "") predicciones[input.id] = input.value;
            });

            await setDoc(doc(db, "predicciones", nombre), { 
                usuario: nombre, 
                predicciones: predicciones,
                fecha: new Date().toISOString() 
            }, { merge: true });
            
            alert("✅ Guardado con éxito");
        }

        async function consultarPublicoSoloLectura() {
            const nombre = document.getElementById('nombreConsultaPublica').value.trim().toLowerCase();
            if (!nombre) return;
            
            const docSnap = await getDoc(doc(db, "predicciones", nombre));
            if (docSnap.exists()) {
                const data = docSnap.data().predicciones;
                Object.keys(data).forEach(id => {
                    const el = document.getElementById(id);
                    if (el) { el.value = data[id]; el.disabled = true; }
                });
                alert("Predicciones cargadas en modo lectura.");
            } else {
                alert("Usuario no encontrado.");
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderizarEstructura();
            document.getElementById('btnGuardar').addEventListener('click', guardarQuiniela);
            document.getElementById('btnConsultaPublica').addEventListener('click', consultarPublicoSoloLectura);
        });
    </script>
