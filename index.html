        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-green: #0a5c36;
            --accent-gold: #ffca28;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin-bottom: 25px;
        }

        .header-card {
            background-color: var(--primary-green);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header-card h1 { margin: 0 0 10px 0; font-size: 1.6rem; }
        .header-card p { margin: 0; color: #e0e0e0; font-size: 0.95rem; }

        .usuario-box {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .grupo-grid { display: flex; flex-direction: column; gap: 25px; }

        .grupo-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .grupo-titulo {
            font-size: 1.3rem;
            color: var(--accent-gold);
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 2px solid var(--primary-green);
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        .jornada-seccion {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
        }

        .jornada-titulo {
            font-size: 0.9rem;
            color: var(--accent-gold);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }

        .jornada-fecha {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: normal;
        }

        .partido {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 5px 0;
        }

        .partido:last-child { margin-bottom: 0; }

        .bloque-equipo { flex: 1; display: flex; align-items: center; gap: 8px; }
        .bloque-equipo.local { justify-content: flex-end; text-align: right; }
        .bloque-equipo.visitante { justify-content: flex-start; text-align: left; }

        .nombre-equipo { font-size: 0.95rem; }

        .input-goles {
            width: 45px;
            padding: 8px;
            background-color: #2a2a2a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
        }

        .input-goles:disabled {
            background-color: #1a1a1a;
            color: #888888;
            border: 1px dashed #444444;
            cursor: not-allowed;
        }

        .vs { font-size: 0.8rem; color: var(--text-muted); font-weight: bold; padding: 0 10px; }

        button {
            width: 100%;
            padding: 15px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #388e3c; }
        button:disabled { background-color: #2e4d32; color: #888888; cursor: not-allowed; box-shadow: none !important; }
        
        .btn-publico { background-color: #d84315; padding: 10px; font-size: 0.9rem; }
        .btn-publico:hover { background-color: #ff5722; }

        .nav-links { display: flex; justify-content: space-between; margin-top: 25px; width: 100%; }
        .nav-links a { color: #4caf50; text-decoration: none; font-size: 0.95rem; font-weight: 500; }
        .nav-links a:hover { text-decoration: underline; }

        function renderizarEstructura() {
            const container = document.getElementById('gruposContainer');
            container.innerHTML = '';

            Object.keys(cronogramaMundial).forEach(nombreGrupo => {
                const card = document.createElement('div');
                card.className = 'grupo-card';
                
                let htmlContenido = `<div class="grupo-titulo">${nombreGrupo}</div>`;
                
                cronogramaMundial[nombreGrupo].forEach(bloqueJornada => {
                    htmlContenido += `
                        <div class="jornada-seccion">
                            <div class="jornada-titulo">
                                <span>📅 ${bloqueJornada.jornada}</span>
                                <span class="jornada-fecha">${bloqueJornada.fecha}</span>
                            </div>
                    `;
                    
                    bloqueJornada.partidos.forEach(partido => {
                        htmlContenido += `
                           <div class="partido" data-jornada="${bloqueJornada.jornada}">
                            <div class="bloque-equipo local">
                                    <span class="nombre-equipo">${partido.local}</span>
                                    <input type="number" id="home-${partido.id}" class="input-goles" min="0" placeholder="-">
                                </div>
                                <span class="vs">vs</span>
                                <div class="bloque-equipo visitante">
                                    <input type="number" id="away-${partido.id}" class="input-goles" min="0" placeholder="-">
                                    <span class="nombre-equipo">${partido.visitante}</span>
                                </div>
                            </div>
                        `;
                    });

                    htmlContenido += `</div>`;
                });
                
                card.innerHTML = htmlContenido;
                container.appendChild(card);
            });
        }

        async function consultarPublicoSoloLectura() {
            const nombreConsulta = document.getElementById('nombreConsultaPublica').value.trim();
            if (!nombreConsulta) {
                alert("❌ Por favor, ingresa el nombre del participante que deseas revisar.");
                return;
            }

            const idNormalizado = nombreConsulta.toLowerCase();

            try {
                const docRef = doc(db, "predicciones", idNormalizado);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data().predicciones || {};
                    
                    document.querySelectorAll('.input-goles').forEach(input => input.value = "");

                    Object.keys(data).forEach(key => {
                        const inputElement = document.getElementById(key);
                        if (inputElement) {
                            inputElement.value = data[key];
                        }
                    });

                    document.querySelectorAll('.input-goles').forEach(input => input.disabled = true);
                    document.getElementById('btnGuardar').disabled = true;

                    alert(`👁️ Viendo la quiniela de: "${docSnap.data().usuario || nombreConsulta}" en modo SOLO LECTURA. No se permiten modificaciones.`);
                } else {
                    alert(`🤷‍♂️ No se encontró ninguna quiniela registrada bajo el nombre "${nombreConsulta}".`);
                }
            } catch (error) {
                console.error(error);
                alert("Error al consultar el perfil solicitado.");
            }
        }


function aplicarBloqueos() {
    document.querySelectorAll('.partido').forEach(partidoDiv => {
        const jornada = partidoDiv.getAttribute('data-jornada');
        if (jornada === 'Jornada 1') {
            partidoDiv.querySelectorAll('input').forEach(input => {
                input.disabled = true;
            });
        }
    });
}
       async function guardarQuiniela() {
    const nombreOriginal = document.getElementById('nombreUsuario').value.trim();
    if (!nombreOriginal) {
        alert("❌ Por favor, escribe tu nombre antes de guardar.");
        return;
    }

    const userIdNormalizado = nombreOriginal.toLowerCase();
    
    // Obtener los datos actuales del documento si existen para fusionarlos
    const docRef = doc(db, "predicciones", userIdNormalizado);
    const docSnap = await getDoc(docRef);
    let prediccionesExistentes = docSnap.exists() ? docSnap.data().predicciones : {};

    // Recolectar nuevos valores
    let nuevosDatos = false;
    document.querySelectorAll('.input-goles').forEach(input => {
        if (input.value !== "" && !input.disabled) { // Solo toma los que no estaban bloqueados
            prediccionesExistentes[input.id] = input.value.toString();
            nuevosDatos = true;
        }
    });

    if (!nuevosDatos) {
        alert("❌ No has ingresado nuevos marcadores para guardar.");
        return;
    }

    try {
        await setDoc(docRef, {
            usuario: nombreOriginal,
            predicciones: prediccionesExistentes,
            ultimaActualizacion: new Date().toISOString()
        }, { merge: true });

        alert("✅ ¡Predicciones guardadas correctamente!");
        location.reload(); 
    } catch (error) {
        console.error(error);
        alert("Error de conexión al guardar.");
    }
}
