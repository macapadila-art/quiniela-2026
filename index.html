<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundial 2026 - Fase de Grupos</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-green: #0a5c36;
            --accent-gold: #ffca28;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin-bottom: 25px;
        }

        .header-card {
            background-color: var(--primary-green);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header-card h1 { margin: 0 0 10px 0; font-size: 1.6rem; }
        .header-card p { margin: 0; color: #e0e0e0; font-size: 0.95rem; }

        .usuario-box {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .grupo-grid { display: flex; flex-direction: column; gap: 25px; }

        .grupo-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .grupo-titulo {
            font-size: 1.3rem;
            color: var(--accent-gold);
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 2px solid var(--primary-green);
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        .jornada-seccion {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
        }

        .jornada-titulo {
            font-size: 0.9rem;
            color: var(--accent-gold);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }

        .jornada-fecha {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: normal;
        }

        .partido {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 5px 0;
        }

        .partido:last-child { margin-bottom: 0; }

        .bloque-equipo { flex: 1; display: flex; align-items: center; gap: 8px; }
        .bloque-equipo.local { justify-content: flex-end; text-align: right; }
        .bloque-equipo.visitante { justify-content: flex-start; text-align: left; }

        .nombre-equipo { font-size: 0.95rem; }

        .input-goles {
            width: 45px;
            padding: 8px;
            background-color: #2a2a2a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
        }

        .input-goles:disabled {
            background-color: #1a1a1a;
            color: #888888;
            border: 1px dashed #444444;
            cursor: not-allowed;
        }

        .vs { font-size: 0.8rem; color: var(--text-muted); font-weight: bold; padding: 0 10px; }

        button {
            width: 100%;
            padding: 15px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #388e3c; }
        button:disabled { background-color: #2e4d32; color: #888888; cursor: not-allowed; box-shadow: none !important; }
        
        .btn-publico { background-color: #d84315; padding: 10px; font-size: 0.9rem; }
        .btn-publico:hover { background-color: #ff5722; }

        .nav-links { display: flex; justify-content: space-between; margin-top: 25px; width: 100%; }
        .nav-links a { color: #4caf50; text-decoration: none; font-size: 0.95rem; font-weight: 500; }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-card">
            <h1>⚽ Quiniela Mundial 2026</h1>
            <p>Calendario Oficial por Jornadas con Bloqueo de Modificación y Consulta de Lectura Pública.</p>
        </div>
    </div>

    <div class="container">
        <div class="usuario-box">
            <div>
                <label style="display:block; font-size:0.85rem; color:var(--text-muted); margin-bottom:5px; font-weight:bold;">TU NOMBRE DE PARTICIPANTE (Registrar):</label>
                <input type="text" id="nombreUsuario" placeholder="Escribe tu nombre (Ej. Juan Perez)" style="width:100%; padding:12px; background-color:#2a2a2a; border:1px solid var(--border-color); border-radius:8px; color:white; font-size:1rem; box-sizing:border-box;">
            </div>
            
            <div style="border-top: 1px solid var(--border-color); padding-top: 12px; margin-top: 4px;">
                <label style="display:block; font-size:0.85rem; color:var(--accent-gold); margin-bottom:5px; font-weight:bold;">COMPROBAR QUINIELA DE OTRO PARTICIPANTE (Solo Lectura):</label>
                <input type="text" id="nombreConsultaPublica" placeholder="Escribe el nombre de tu amigo..." style="width:100%; padding:12px; background-color:#2a2a2a; border:1px solid var(--border-color); border-radius:8px; color:white; font-size:1rem; box-sizing:border-box;">
                <button type="button" id="btnConsultaPublica" class="btn-publico" style="margin-top: 8px;">👁️ Ver Predicciones de otro Participante</button>
            </div>
        </div>
    </div>

    <div class="container">
        <form id="quinielaForm">
            <div id="gruposContainer" class="grupo-grid"></div>
            <button type="button" id="btnGuardar" style="position: sticky; bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; margin-top: 20px;">Guardar Mis Pronósticos</button>
        </form>

        <div class="nav-links">
            <a href="posiciones.html" style="font-weight: bold; color: var(--accent-gold);">📊 Ver Tabla de Posiciones Global →</a>
            <a href="eliminatoria.html">Segunda Fase (Eliminatorias) 🏆</a>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Configuración (La que ya tienes)
    const firebaseConfig = { /* ... tus datos ... */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. PRIMERO: Definimos todas las funciones
    async function renderizarEstructura() {
        const container = document.getElementById('gruposContainer');
        // ... (todo el código que ya tienes para crear el HTML)
    }

    async function guardarQuiniela() {
        const nombreOriginal = document.getElementById('nombreUsuario').value.trim();
        if (!nombreOriginal) { alert("❌ Escribe tu nombre"); return; }

        const docRef = doc(db, "predicciones", nombreOriginal.toLowerCase());
        const docSnap = await getDoc(docRef);
        
        // Obtener predicciones anteriores si existen, si no, crear objeto vacío
        let datosGuardados = docSnap.exists() ? docSnap.data().predicciones : {};

        // Fusionar con los nuevos datos
        document.querySelectorAll('.input-goles').forEach(input => {
            if (input.value !== "") {
                datosGuardados[input.id] = input.value.toString();
            }
        });

        try {
            await setDoc(docRef, {
                usuario: nombreOriginal,
                predicciones: datosGuardados,
                ultimaActualizacion: new Date().toISOString()
            }, { merge: true });
            alert("✅ ¡Marcadores guardados con éxito!");
            location.reload();
        } catch (e) { console.error(e); alert("Error al guardar"); }
    }

    async function consultarPublicoSoloLectura() {
        // ... (tu función actual de lectura)
    }

    // 2. SEGUNDO: Ejecutamos el renderizado
    renderizarEstructura();

    // 3. TERCERO: Asignamos eventos a los botones
    document.getElementById('btnGuardar').addEventListener('click', guardarQuiniela);
    document.getElementById('btnConsultaPublica').addEventListener('click', consultarPublicoSoloLectura);
</script>
</body>
</html>
